name: Build and Deploy Allure Report

on:
  push:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu-latest

    # ✅ This enables GitHub Deployment / Environments section
    environment:
      name: github-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run tests
        run: mvn clean test

      - name: Check Allure results folder
        run: |
          if [ -d "target/allure-results" ] && [ "$(ls -A target/allure-results)" ]; then
            echo "Allure results generated"
            ls target/allure-results
          else
            echo "No Allure results found"
            exit 0
          fi

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      #  DEPLOYMENT STEP (THIS CREATES DEPLOYMENT)
    - name: Deploy Allure Report to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
       with:
       github_token: ${{ secrets.GITHUB_TOKEN }}
       publish_dir: allure-history
